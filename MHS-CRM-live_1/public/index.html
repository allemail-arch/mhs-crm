<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHS CRM</title>
<style>
  :root{
    --navy:#14213d; --navy2:#1d3a63; --blue:#2d5be3; --blue-l:#eaf0ff;
    --orange:#ff6a00; --bg:#f4f6fb; --card:#ffffff; --line:#e6e9f2;
    --text:#1a2233; --muted:#6b7488; --green:#12a150; --red:#e5484d;
    --amber:#f5a623; --purple:#7c5cff; --shadow:0 1px 3px rgba(20,33,61,.08),0 8px 24px rgba(20,33,61,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;
    background:var(--bg);color:var(--text);font-size:14px;line-height:1.45}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:inherit;font-size:14px}
  a{color:var(--blue);text-decoration:none}
  .hidden{display:none !important}
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#14213d 0%,#1d3a63 60%,#2d5be3 130%);padding:20px}
  .login-card{background:#fff;border-radius:20px;box-shadow:var(--shadow);width:100%;max-width:400px;
    padding:30px 26px;text-align:center}
  .brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:4px}
  .brand .logo{width:40px;height:40px;border-radius:11px;background:var(--navy);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px}
  .brand .logo b{color:var(--orange)}
  .brand h1{font-size:20px;margin:0;letter-spacing:.3px}
  .sub{color:var(--muted);font-size:12.5px;margin:6px 0 20px}
  .pin-display{display:flex;gap:10px;justify-content:center;margin:8px 0 16px}
  .pin-dot{width:15px;height:15px;border-radius:50%;border:2px solid var(--line);background:#fff}
  .pin-dot.on{background:var(--blue);border-color:var(--blue)}
  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:260px;margin:0 auto}
  .key{height:56px;border-radius:14px;background:var(--bg);font-size:22px;font-weight:600;color:var(--navy);
    display:flex;align-items:center;justify-content:center;transition:.1s;border:1px solid var(--line)}
  .key:active{background:var(--blue-l);transform:scale(.96)}
  .key.fn{font-size:14px;color:var(--muted);font-weight:600}
  .login-err{color:var(--red);font-size:12.5px;height:16px;margin-top:12px}
  .demo-box{margin-top:22px;border-top:1px dashed var(--line);padding-top:16px;text-align:left}
  .demo-box .t{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:8px;font-weight:700}
  .demo-sel{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:11px;background:#fff}
  .app{min-height:100vh;padding-bottom:76px}
  .topbar{position:sticky;top:0;z-index:30;background:#fff;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:14px;padding:10px 18px}
  .topbar .logo{width:34px;height:34px;border-radius:9px;background:var(--navy);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex:0 0 auto}
  .topbar .logo b{color:var(--orange)}
  .topnav{display:flex;gap:4px;margin-left:8px}
  .topnav a{padding:8px 14px;border-radius:9px;color:var(--muted);font-weight:600;font-size:13.5px}
  .topnav a.active{background:var(--blue-l);color:var(--blue)}
  .topnav a:hover{color:var(--navy)}
  .spacer{flex:1}
  .userchip{display:flex;align-items:center;gap:9px;cursor:pointer;padding:5px 8px;border-radius:10px}
  .userchip:hover{background:var(--bg)}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--blue);color:#fff;display:flex;
    align-items:center;justify-content:center;font-weight:700;font-size:12.5px;flex:0 0 auto}
  .userchip .nm{font-weight:700;font-size:13px;line-height:1.1}
  .userchip .rl{font-size:11px;color:var(--muted)}
  .btn{background:var(--blue);color:#fff;padding:9px 16px;border-radius:10px;font-weight:700;font-size:13.5px}
  .btn:hover{background:#2049c9}
  .btn.orange{background:var(--orange)} .btn.orange:hover{background:#e85f00}
  .btn.ghost{background:#fff;color:var(--navy);border:1px solid var(--line)}
  .btn.ghost:hover{background:var(--bg)}
  .btn.sm{padding:7px 12px;font-size:12.5px}
  .btn.block{width:100%;justify-content:center;display:flex}
  .content{max-width:1180px;margin:0 auto;padding:20px 18px}
  .page-h{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .page-h h2{margin:0;font-size:20px}
  .page-h .cnt{color:var(--muted);font-weight:600}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px;box-shadow:var(--shadow)}
  .kpi .lbl{color:var(--muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .kpi .val{font-size:26px;font-weight:800;margin-top:4px}
  .kpi .sub{font-size:11.5px;color:var(--muted);margin-top:2px}
  .kpi .val.g{color:var(--green)} .kpi .val.b{color:var(--blue)} .kpi .val.o{color:var(--orange)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  .panel-h{padding:14px 16px;border-bottom:1px solid var(--line);font-weight:700;display:flex;align-items:center;justify-content:space-between}
  .panel-b{padding:14px 16px}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:11px}
  .bar-row .nm{width:96px;font-size:12.5px;font-weight:600;flex:0 0 auto}
  .bar-track{flex:1;height:20px;background:var(--bg);border-radius:8px;overflow:hidden}
  .bar-fill{height:100%;border-radius:8px}
  .bar-row .n{width:34px;text-align:right;font-weight:700;font-size:12.5px}
  .funnel .fr{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .funnel .fr .lb{width:110px;font-size:12.5px;font-weight:600}
  .funnel .fr .fb{flex:1;height:26px;border-radius:7px;color:#fff;font-weight:700;font-size:12px;
    display:flex;align-items:center;padding:0 10px}
  .table-wrap{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  table{width:100%;border-collapse:collapse}
  thead th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);
    background:#fafbff;padding:12px 14px;border-bottom:1px solid var(--line);font-weight:700;white-space:nowrap}
  tbody td{padding:12px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:#fafbff;cursor:pointer}
  .lead-nm{font-weight:700}
  .lead-sub{font-size:11.5px;color:var(--muted)}
  td.num{text-align:right;font-weight:600}
  .grp-td{font-weight:800;color:var(--navy)}
  .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700;white-space:nowrap}
  .dot{width:7px;height:7px;border-radius:50%}
  .b-fresh{background:#eef2ff;color:#3b5bdb}
  .b-rnr{background:#fff4e5;color:#c77700}
  .b-follow{background:#e7f3ff;color:#1971c2}
  .b-interested{background:#e6f7ee;color:#0b8a43}
  .b-notint{background:#fdecea;color:#c0392b}
  .b-junk{background:#f1f3f5;color:#868e96}
  .b-won{background:#e6f7ee;color:#0b8a43}
  .b-lost{background:#fdecea;color:#c0392b}
  .src{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--navy)}
  .src .si{width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:800}
  .pill{padding:2px 9px;border-radius:7px;background:var(--bg);font-size:11.5px;font-weight:700;color:var(--navy)}
  .overdue{color:var(--red);font-weight:700}
  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
  .filters input,.filters select{padding:9px 12px;border:1px solid var(--line);border-radius:10px;background:#fff}
  .search{flex:1;min-width:180px}
  .cards{display:none;flex-direction:column;gap:12px}
  .lcard{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:14px}
  .lcard .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .lcard .nm{font-weight:800;font-size:15px}
  .lcard .meta{font-size:12px;color:var(--muted);margin-top:2px}
  .lcard .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:center}
  .lcard .acts{display:flex;gap:8px;margin-top:12px}
  .lcard .acts .btn{flex:1}
  .ico-btn{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;flex:0 0 auto}
  .ico-call{background:#e6f7ee;color:var(--green)}
  .ico-wa{background:#e7fbef;color:#25d366}
  .botnav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:40;background:#fff;
    border-top:1px solid var(--line);padding:6px 4px 8px;justify-content:space-around}
  .botnav a{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:10.5px;font-weight:700;padding:5px 10px;border-radius:10px;flex:1}
  .botnav a.active{color:var(--blue)}
  .botnav .bi{font-size:19px}
  .ld-head{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
  .ld-head .r1{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .ld-avatar{width:52px;height:52px;border-radius:14px;background:var(--navy);color:#fff;display:flex;
    align-items:center;justify-content:center;font-weight:800;font-size:19px}
  .ld-head h2{margin:0;font-size:21px}
  .ld-contact{display:flex;gap:18px;flex-wrap:wrap;margin-top:12px;color:var(--muted);font-size:13px}
  .ld-contact b{color:var(--text)}
  .ld-actions{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .field label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .field input,.field select,.field textarea{padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;width:100%}
  .timeline{list-style:none;margin:0;padding:0}
  .timeline li{position:relative;padding:0 0 16px 22px;border-left:2px solid var(--line);margin-left:6px}
  .timeline li:last-child{border-left-color:transparent}
  .timeline li:before{content:'';position:absolute;left:-7px;top:2px;width:12px;height:12px;border-radius:50%;background:var(--blue);border:2px solid #fff}
  .timeline .tt{font-weight:700;font-size:13px}
  .timeline .tm{font-size:11.5px;color:var(--muted)}
  .modal-bg{position:fixed;inset:0;background:rgba(20,33,61,.5);z-index:60;display:flex;align-items:center;justify-content:center;padding:18px}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:480px;max-height:90vh;overflow:auto;box-shadow:var(--shadow)}
  .modal-h{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .modal-h h3{margin:0;font-size:17px}
  .modal-b{padding:18px}
  .x{font-size:22px;color:var(--muted);cursor:pointer;line-height:1}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;
    padding:12px 18px;border-radius:12px;font-weight:600;font-size:13px;z-index:80;box-shadow:var(--shadow);
    display:flex;align-items:center;gap:9px;max-width:90vw}
  .toast .ok{width:20px;height:20px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:12px}
  .convo{display:inline-flex;align-items:center;gap:6px;background:#e6f7ee;color:var(--green);padding:4px 11px;border-radius:20px;font-weight:700;font-size:12px}
  @media(max-width:820px){ .kpis{grid-template-columns:1fr 1fr} .grid2{grid-template-columns:1fr} }
  @media(max-width:720px){
    .topnav{display:none} .botnav{display:flex} .userchip .nm,.userchip .rl{display:none}
    .table-wrap{display:none} .cards{display:flex} .content{padding:16px 14px}
    .page-h h2{font-size:18px} .desktop-only{display:none !important} .add-lead-top{display:none}
  }
  @media(min-width:721px){ .mobile-only{display:none !important} }
</style>

<body>
<div id="root"></div>
<script>
/* ============================================================
   MHS CRM — frontend (talks to the real backend API)
   ============================================================ */

/* presentation maps (colors/icons only; data comes from API) */
const SOURCES={Facebook:{c:'#1877f2',i:'f'},Calendly:{c:'#006bff',i:'C'},LinkedIn:{c:'#0a66c2',i:'in'},
  Website:{c:'#ff6a00',i:'W'},WhatsApp:{c:'#25d366',i:'wa'},'Bulk Upload':{c:'#7c5cff',i:'B'},Manual:{c:'#6b7488',i:'M'}};
const STATUS={
  'Fresh':{cls:'b-fresh',dot:'#3b5bdb',open:true,fresh:true},'RNR':{cls:'b-rnr',dot:'#c77700',open:true},
  'Follow Up':{cls:'b-follow',dot:'#1971c2',open:true},'Interested':{cls:'b-interested',dot:'#0b8a43',open:true},
  'Not Interested':{cls:'b-notint',dot:'#c0392b',open:false},'Junk':{cls:'b-junk',dot:'#868e96',open:false},
  'Closed Won':{cls:'b-won',dot:'#0b8a43',open:false,won:true},'Closed Lost':{cls:'b-lost',dot:'#c0392b',open:false}};
const STATUS_LIST=Object.keys(STATUS);
/* demo quick-login PINs (remove in production) */
const DEMO=[['u_admin','Abhishek Vyas — Admin','1111'],['u_lead','Rahul Mehta — Team Lead','2222'],
  ['s01','Abhishek Bhadoriya — Sales','0001'],['s02','Aishwarya Deshmukh — Sales','0002'],
  ['s03','Akshay Bhosale — Sales','0003'],['s04','Akshay Sangle — Sales','0004'],
  ['s05','Ankit Singh — Sales','0005'],['s06','Anu Sharma — Sales','0006'],
  ['s07','Anurag Das — Sales','0007'],['s08','Arati Innani — Sales','0008'],
  ['s09','Babitha Bhuwalia — Sales','0009'],['s10','Prachi Nair — Sales','0010']];

const state={ token:null, user:null, cfg:null, route:'dashboard', params:{}, pin:'', loginErr:'',
  leads:[], users:[], connectors:[], automation:{}, reports:{}, currentLead:null,
  filters:{q:'',status:'',source:'',owner:'',product:'',open:''}, dashFilter:{from:'',to:'',source:'',department:'',owner:''},
  searchQ:'', searchResults:[], reportTab:'attendance', toastMsg:'', busy:false };

const CFG=()=>state.cfg||{teams:{}};
const teamName=k=>esc(CFG().teams[k]?.name||k);
const teamCode=k=>CFG().teams[k]?.code||k;
const salesUsers=()=>state.users.filter(u=>u.role==='sales');
const userById=id=>state.users.find(u=>u.id===id);
const initials=n=>String(n||'').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();
/* escape ALL user-provided text before putting it in innerHTML (prevents XSS) */
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function parseD(s){ if(!s)return null; return new Date(String(s).length<=10?s+'T00:00:00':String(s).replace(' ','T')); }
function fmtDate(s){ const d=parseD(s); return d?d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'}):'—'; }
function fmtDateTime(s){ const d=parseD(s); return d?d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}):''; }
function isOverdue(s){ if(!s)return false; const t=new Date();t.setHours(0,0,0,0); const x=parseD(s);x.setHours(0,0,0,0); return x<t; }
function isToday(s){ if(!s)return false; const t=new Date(),x=parseD(s); return x.getDate()===t.getDate()&&x.getMonth()===t.getMonth()&&x.getFullYear()===t.getFullYear(); }
function scoreTier(v){ if(v>=75)return{t:'Hot',c:'#e5484d'}; if(v>=55)return{t:'Warm',c:'#f5a623'}; return{t:'Cold',c:'#6b7488'}; }
function fmtDur(s){ s=+s||0; if(!s)return '—'; const m=Math.floor(s/60),ss=s%60; return m?m+'m '+ss+'s':ss+'s'; }
const todayStr=()=>new Date().toISOString().slice(0,10);
function loginTime(s){ if(!s)return '—'; try{ return new Date(String(s).replace(' ','T')+'Z').toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); }catch(_){ return s; } }
function downloadCSV(filename, rows){ const csv=rows.map(r=>r.map(c=>{c=String(c==null?'':c); return /[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;}).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); }

/* ---------------- API ---------------- */
async function api(path,method='GET',body){
  const opt={method,headers:{}};
  if(state.token) opt.headers['Authorization']='Bearer '+state.token;
  if(body){ opt.headers['Content-Type']='application/json'; opt.body=JSON.stringify(body); }
  const r=await fetch(path,opt);
  if(r.status===401 && state.user){ logout(); throw new Error('session expired'); }
  return r.json();
}
async function loadRouteData(){
  const r=state.route, role=state.user.role;
  if(r==='dashboard'){
    const f=state.dashFilter; const qs=new URLSearchParams();
    ['from','to','source','department','owner'].forEach(k=>{ if(f[k]) qs.set(k,f[k]); });
    const q=qs.toString()?'?'+qs.toString():'';
    state.reports.summary=await api('/api/reports/summary'+q);
    if(role==='sales'){ state.leads=(await api('/api/leads')).leads; }
    else { state.reports.agents=(await api('/api/reports/agents'+q)).agents; state.reports.activity=(await api('/api/reports/activity'+q)).activity; }
  } else if(r==='leads'||r==='myleads'){
    const q=new URLSearchParams(); const f=state.filters;
    if(f.q)q.set('q',f.q); if(f.status)q.set('status',f.status); if(f.source)q.set('source',f.source); if(f.owner)q.set('owner',f.owner);
    if(f.product)q.set('product',f.product); if(f.open)q.set('open','1');
    state.leads=(await api('/api/leads?'+q.toString())).leads;
  } else if(r==='followups'){
    state.leads=(await api('/api/leads')).leads;
    if(role!=='sales') state.reports.followups=await api('/api/reports/followups');
  } else if(r==='settings'){
    state.settings=(await api('/api/settings')).settings;
  } else if(r==='reports'){
    state.reports.attendance=await api('/api/reports/attendance');
    state.reports.leadsDist=await api('/api/reports/leads-distribution'+(state.reportDate?('?from='+state.reportDate+'&to='+state.reportDate):''));
    state.reports.followups=await api('/api/reports/followups');
    state.reports.deletions=await api('/api/reports/deletions');
    state.reports.usersList=await api('/api/reports/users');
  } else if(r==='search'){
    state.searchResults=state.searchQ?((await api('/api/leads/search?q='+encodeURIComponent(state.searchQ))).leads||[]):[];
  } else if(r==='users'){
    state.users=(await api('/api/users')).users;
  } else if(r==='connectors'){
    state.connectors=(await api('/api/connectors')).connectors;
    state.automation=(await api('/api/automation')).automation;
  } else if(r==='lead'){
    state.currentLead=(await api('/api/leads/'+state.params.id)).lead;
  }
}
async function go(route,params){ state.route=route; state.params=params||{}; window.scrollTo(0,0);
  try{ await loadRouteData(); }catch(e){ return; } render(); }
async function refresh(){ try{ await loadRouteData(); }catch(e){ return; } render(); }

async function doLogin(pin){
  let r; try{ r=await api('/api/login','POST',{pin}); }catch(e){ state.loginErr='Server se connect nahi ho paya'; state.pin=''; render(); return; }
  if(r.error){ state.loginErr=r.error+'. Dubara try karo.'; state.pin=''; render(); return; }
  state.token=r.token; state.user=r.user;
  const me=await api('/api/me'); setCfg(me.config);
  state.users=(await api('/api/users')).users;
  state.route='dashboard'; state.pin=''; state.loginErr='';
  await loadRouteData(); render();
}
function logout(){ state.token=null; state.user=null; state.pin=''; state.route='dashboard'; render(); }

/* ============================================================ RENDER ============================================================ */
const root=()=>document.getElementById('root');
function render(){
  if(!state.user){ root().innerHTML=renderLogin(); return; }
  root().innerHTML=renderShell(pageContent());
  if(state.toastMsg){ showToast(state.toastMsg); state.toastMsg=''; }
}

function navItems(){

  if(r==='lead')  return [['dashboard','Team Report','📊'],['leads','Team Leads','📋'],['followups','Follow-ups','⏰']];

}
function renderShell(inner){
  const u=state.user;
  const roleLabel=u.role==='admin'?'Admin':u.role==='lead'?'Team Lead • '+teamCode(u.team):'Sales • '+teamCode(u.team);
  const nav=navItems();
  const top=nav.map(n=>`<a data-nav="${n[0]}" class="${state.route===n[0]?'active':''}">${n[1]}</a>`).join('');

      <input id="globalSearch" placeholder="🔍 Lead search — kiske paas hai?" value="${esc(state.searchQ||'')}" style="flex:1;max-width:280px;margin-left:10px;padding:8px 12px;border:1px solid var(--line);border-radius:10px;background:#fff">
      <div class="spacer"></div>

function pageContent(){
  switch(state.route){
    case 'dashboard': return renderDashboard();
    case 'leads': return renderLeads(false);
    case 'myleads': return renderLeads(true);
    case 'followups': return renderFollowups();
    case 'users': return renderUsers();
    case 'connectors': return renderConnectors();
    case 'settings': return renderSettings();
    case 'reports': return renderReports();
    case 'search': return renderSearch();
    case 'lead': return renderLeadDetail();
    default: return renderDashboard();
  }
}

function setCfg(c){ state.cfg=c; state.cfg.sourcesMap=Object.fromEntries((c.sources||[]).map(s=>[s.name,{c:s.color,i:s.icon}])); }
function srcMeta(s){ const m=state.cfg&&state.cfg.sourcesMap&&state.cfg.sourcesMap[s]; return m||SOURCES[s]||{c:'#6b7488',i:String(s||'?').slice(0,2)}; }
function srcList(){ return (state.cfg&&state.cfg.sources)?state.cfg.sources.map(x=>x.name):Object.keys(SOURCES); }
function badge(s){const x=STATUS[s]||{cls:'b-junk',dot:'#888'};return `<span class="badge ${x.cls}"><span class="dot" style="background:${x.dot}"></span>${esc(s)}</span>`;}
function srcChip(s){const m=srcMeta(s);return `<span class="src"><span class="si" style="background:${m.c}">${m.i}</span>${esc(s)}</span>`;}

/* ---------------- DASHBOARD ---------------- */
function targetCard(title,leadsN,intN,closeN,tgt,drillProduct){
  const bar=(lbl,n,t,c)=>{const p=Math.min(100,Math.round(n/t*100));
    return `<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12.5px;font-weight:700;margin-bottom:4px">
      <span>${lbl}</span><span style="color:${p>=100?'#12a150':'var(--muted)'}">${n}/${t} ${p>=100?'✓':''}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${c}"></div></div></div>`;};
  return `<div class="panel" ${drillProduct?`data-drill data-fproduct="${drillProduct}" style="cursor:pointer"`:''}><div class="panel-h">${title}<span style="font-size:11px;color:var(--muted);font-weight:600">Target</span></div>
    <div class="panel-b">${bar('Leads',leadsN,tgt.leads,'#2d5be3')}${bar('Interested',intN,tgt.interested,'#f5a623')}${bar('Closed Won',closeN,tgt.closed,'#12a150')}</div></div>`;
}
function todayCallCard(l){const over=isOverdue(l.next_followup);
  return `<div class="lcard" data-lead="${l.id}">
    <div class="top"><div><div class="nm">${esc(l.name)}</div><div class="meta">${esc(l.phone)} • ${esc(l.city)} • ${esc(l.product)}</div></div>${badge(l.status)}</div>
    <div class="row"><span class="meta ${over?'overdue':''}">⏰ ${fmtDate(l.next_followup)}${over?' (overdue)':' (today)'}</span>${srcChip(l.source)}</div>
    <div class="acts"><button class="btn" data-action="call" data-lead="${l.id}">📞 Call</button>
      <button class="btn ghost" data-action="wa" data-lead="${l.id}">WhatsApp</button>
      <button class="btn ghost" data-lead="${l.id}">Open</button></div></div>`;
}
function funnelHTML(funnel){
  const maxF=Math.max(1,...funnel.map(f=>f.n));
  return funnel.map(f=>`<div class="fr" data-drill data-fstatus="${f.st}" style="cursor:pointer"><div class="lb">${f.st}</div><div class="fb" style="width:${Math.max(10,f.n/maxF*100)}%;background:${(STATUS[f.st]||{}).dot||'#888'}">${f.n}</div></div>`).join('');
}
function sourceBars(bySource){
  const arr=bySource.slice().sort((a,b)=>b.n-a.n); const max=Math.max(1,...arr.map(x=>x.n));
  return arr.map(x=>{const m=srcMeta(x.src);
    return `<div class="bar-row" data-drill data-fsource="${esc(x.src)}" style="cursor:pointer"><div class="nm"><span class="src"><span class="si" style="background:${m.c}">${m.i}</span>${esc(x.src)}</span></div>
    <div class="bar-track"><div class="bar-fill" style="width:${x.n/max*100}%;background:${m.c}"></div></div><div class="n">${x.n}</div></div>`;}).join('');
}
function renderDashboard(){
  const sm=state.reports.summary||{total:0,won:0,open:0,interested:0,conv:0,bySource:[],funnel:[]};
  const kpis=`<div class="kpis">

    const todayLs=openLs.filter(l=>isOverdue(l.next_followup)||isToday(l.next_followup)).sort((a,b)=>parseD(a.next_followup)-parseD(b.next_followup));
    const first=esc(state.user.name.split(' ')[0]);
    const list=todayLs.length?`<div class="cards" style="display:flex">${todayLs.map(todayCallCard).join('')}</div>`

    return `<div class="page-h"><h2>Namaste, ${first} 👋</h2></div>
      <div class="panel" style="margin-bottom:16px;border:2px solid #ffe0c2">
        <div class="panel-h" style="color:var(--orange)">📞 Aaj call karni hai — ${todayLs.length} leads<span class="badge b-rnr">Priority</span></div>
        <div class="panel-b">${list}</div></div>
      ${kpis}
      <div class="grid2">${targetCard('Mera Target (month)',sm.total,sm.interested,sm.won,CFG().agentTarget||{leads:20,interested:6,closed:2})}
        <div class="panel"><div class="panel-h">My Funnel</div><div class="panel-b funnel">${funnelHTML(sm.funnel)}</div></div></div>`;
  }

  // admin / lead
  const activity=state.reports.activity||[];
  const offenders=activity.filter(a=>a.junk>=3).sort((a,b)=>b.junk-a.junk);
  let junkAlert='';
  if(offenders.length) junkAlert=`<div class="panel" style="border:2px solid #ffd0cf;background:#fff7f7;margin-bottom:16px">
    <div class="panel-b" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap"><span style="font-size:22px">⚠️</span>
    <div style="flex:1"><b style="color:var(--red)">Junk alert:</b> ${offenders.map(x=>`<span data-drill data-fowner="${x.id}" data-fstatus="Junk" style="cursor:pointer;text-decoration:underline">${esc(x.name)}</span> ne <b>${x.junk}</b> leads Junk maari`).join(' • ')}.
    <span class="lead-sub">Inke leads review karo.</span></div></div></div>`;

  const agents=state.reports.agents||[];
  const teamAgg={}; agents.forEach(a=>{const t=teamAgg[a.team]=teamAgg[a.team]||{leads:0,interested:0,closed:0};
    t.leads+=a.total; t.interested+=a.counts['Interested']||0; t.closed+=a.counts['Closed Won']||0;});
  const teamKeys=state.user.role==='admin'?Object.keys(CFG().teams):[state.user.team];
  const at=CFG().agentTarget||{leads:200,interested:60,closed:20};
  const teamCards=teamKeys.map(tk=>{const t=teamAgg[tk]||{leads:0,interested:0,closed:0};
    const heads=Math.max(1,salesUsers().filter(u=>u.team===tk).length);
    const tgt={leads:at.leads*heads,interested:at.interested*heads,closed:at.closed*heads};
    return targetCard(teamName(tk)+' <span class="lead-sub">('+heads+' agents)</span>',t.leads,t.interested,t.closed,tgt,tk);}).join('');

  const actRows=activity.map(a=>{const respFlag=a.avgRespMin>=5?'style="color:var(--red);font-weight:700"':'';
    return `<tr data-drill data-fowner="${a.id}" style="cursor:pointer"><td><div style="display:flex;align-items:center;gap:8px">
      <span class="dot" style="background:${a.working?'#12a150':'#c4c9d4'}"></span>
      <div><div class="lead-nm">${esc(a.name)}</div><div class="lead-sub">${teamCode(a.team)}</div></div></div></td>
      <td>${a.working?'<span class="badge b-interested">Working</span>':'<span class="badge b-junk">Idle</span>'}</td>
      <td class="num">${a.callsToday}</td>
      <td class="num">${fmtDur(a.talktime)}</td>
      <td class="num" ${respFlag}>${a.avgRespMin!=null?a.avgRespMin+' min':'—'}</td>
      <td class="num" ${a.junk>=3?'style="color:var(--red);font-weight:700"':''}>${a.junk}</td></tr>`;}).join('');
  const activityPanel=`<div class="panel" style="margin-top:16px"><div class="panel-h">Team Activity — kaun kaam kar raha hai
    <span class="lead-sub">🟢 Working = aaj connected call kiya • ⚪ Idle = aaj koi call nahi • Calls = connected only • Avg response = lead aane se pehli call tak</span></div>
    <div style="overflow-x:auto"><table><thead><tr><th>Agent</th><th>Status</th><th style="text-align:right">Calls today</th><th style="text-align:right">Talk time</th><th style="text-align:right">Avg response</th><th style="text-align:right">Junk</th></tr></thead>
    <tbody>${actRows}</tbody></table></div></div>`;

  // agent report (grouped by team)
  const cols=['Fresh','Follow Up','Interested','Not Interested','Closed Won'];
  const sorted=agents.slice().sort((a,b)=>a.team.localeCompare(b.team)||a.name.localeCompare(b.name));

    rows+=`<tr>${teamCell}<td data-drillowner="${u.id}" style="cursor:pointer"><div class="lead-nm" style="color:var(--blue)">${esc(u.name)}</div><div class="lead-sub">${esc(u.email||'')}</div></td>

  const agentPanel=`<div class="panel" style="margin-top:16px"><div class="panel-h">Opportunity Stage Report — by Agent<span class="lead-sub">kisi number/naam pe click karo → wo leads khul jayenge</span></div>

  const title=state.user.role==='lead'?'Team Report — '+teamName(state.user.team):'Admin Dashboard';
  const f=state.dashFilter;
  const srcOpt=srcList().map(s=>`<option value="${s}" ${f.source===s?'selected':''}>${s}</option>`).join('');
  const depOpt=(CFG().departments||[]).map(d=>`<option value="${esc(d)}" ${f.department===d?'selected':''}>${esc(d)}</option>`).join('');
  const empOpt=salesUsers().map(u=>`<option value="${u.id}" ${f.owner===u.id?'selected':''}>${esc(u.name)}</option>`).join('');
  const active=f.from||f.to||f.source||f.department||f.owner;
  const dateBar=`<div class="filters" style="background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px">
    <span class="lead-sub" style="font-weight:700">📅 From</span><input type="date" id="dfrom" value="${esc(f.from)}">

    <select id="ddept"><option value="">All Departments</option>${depOpt}</select>
    <select id="downer"><option value="">All Employees</option>${empOpt}</select>
    <button class="btn sm" data-action="applydash">Apply Filter</button>${active?' <button class="btn ghost sm" data-action="cleardash">Clear</button>':''}</div>`;
  return `<div class="page-h"><h2>${title}</h2></div>${dateBar}${junkAlert}${kpis}
    <div class="page-h" style="margin-top:6px"><h2 style="font-size:15px">🎯 Targets</h2></div>
    <div class="kpis">${teamCards}</div>${activityPanel}
    <div class="grid2" style="margin-top:16px">
      <div class="panel"><div class="panel-h">Leads by Source</div><div class="panel-b">${sourceBars(sm.bySource)}</div></div>
      <div class="panel"><div class="panel-h">Sales Funnel</div><div class="panel-b funnel">${funnelHTML(sm.funnel)}</div></div></div>
    ${agentPanel}`;
}

/* ---------------- LEAD LIST ---------------- */
function filterBar(showOwner){
  const f=state.filters;
  const stOpt=STATUS_LIST.map(s=>`<option ${f.status===s?'selected':''}>${s}</option>`).join('');
  const srOpt=srcList().map(s=>`<option ${f.source===s?'selected':''}>${s}</option>`).join('');
  const owOpt=salesUsers().map(u=>`<option value="${u.id}" ${f.owner===u.id?'selected':''}>${esc(u.name)}</option>`).join('');
  const prOpt=Object.keys(CFG().teams).map(p=>`<option value="${p}" ${f.product===p?'selected':''}>${teamName(p)}</option>`).join('');
  const any=f.status||f.source||f.owner||f.product||f.open||f.q;
  return `<div class="filters">
    <input class="search" id="fq" placeholder="🔍  Search name, phone, city…" value="${esc(f.q)}">
    <select id="fstatus"><option value="">All Status</option>${stOpt}</select>
    <select id="fsource"><option value="">All Sources</option>${srOpt}</select>
    ${showOwner?`<select id="fproduct"><option value="">All Products</option>${prOpt}</select>`:''}

    ${f.open?'<span class="pill">Open only</span>':''}

}

    return `<tr data-lead="${l.id}"><td><div class="lead-nm">${esc(l.name)}</div><div class="lead-sub">${esc(l.phone)} • ${esc(l.city)}</div></td>
      <td>${srcChip(l.source)}</td><td><span class="pill">${esc(l.product)}</span></td><td>${badge(l.status)}</td>

  const cards=ls.map(l=>{const fu=l.next_followup?`⏰ ${fmtDate(l.next_followup)}${isOverdue(l.next_followup)?' (overdue)':isToday(l.next_followup)?' (today)':''}`:'';
    return `<div class="lcard" data-lead="${l.id}"><div class="top"><div><div class="nm">${esc(l.name)}</div><div class="meta">${esc(l.phone)} • ${esc(l.city)}</div></div>${badge(l.status)}</div>

/* ---------------- FOLLOW-UPS ---------------- */
function renderFollowups(){
  const ls=state.leads.filter(l=>l.next_followup && STATUS[l.status]?.open).sort((a,b)=>parseD(a.next_followup)-parseD(b.next_followup));

  const showOwner=state.user.role!=='sales';
  const card=l=>`<div class="lcard" data-lead="${l.id}"><div class="top"><div><div class="nm">${esc(l.name)}</div><div class="meta">${esc(l.phone)} • ${esc(l.city)} • ${esc(l.product)}</div></div>${badge(l.status)}</div>
    <div class="row"><span class="meta ${isOverdue(l.next_followup)?'overdue':''}">⏰ ${fmtDate(l.next_followup)}</span>${srcChip(l.source)}${showOwner?`<span class="meta">👤 ${esc(l.owner_name)}</span>`:''}</div>
    <div class="acts"><button class="btn" data-action="call" data-lead="${l.id}">📞 Call</button>
      <button class="btn ghost" data-action="wa" data-lead="${l.id}">WhatsApp</button>
      <button class="btn ghost" data-lead="${l.id}">Open</button></div></div>`;
  const sec=(t,arr,c)=>arr.length?`<div class="page-h" style="margin-top:18px"><h2 style="font-size:16px;color:${c}">${t}</h2><span class="cnt">${arr.length}</span></div><div class="cards" style="display:flex">${arr.map(card).join('')}</div>`:'';
  const empty=ls.length?'':'<div class="panel"><div class="panel-b" style="text-align:center;color:var(--muted);padding:30px">🎉 No pending follow-ups.</div></div>';
  let missedPanel='';
  if(state.user.role!=='sales' && state.reports.followups){

function splitCsv(line){ const out=[]; let cur='',q=false;
  for(let i=0;i<line.length;i++){ const c=line[i];
    if(c==='"'){ if(q&&line[i+1]==='"'){cur+='"';i++;} else q=!q; }
    else if(c===','&&!q){ out.push(cur); cur=''; } else cur+=c; }
  out.push(cur); return out.map(s=>s.trim()); }
function csvToRows(text){ const lines=text.split(/\r?\n/).filter(l=>l.trim()); if(!lines.length)return[];
  const headers=splitCsv(lines[0]); return lines.slice(1).map(line=>{const cells=splitCsv(line);const o={};headers.forEach((h,i)=>o[h]=cells[i]||'');return o;}); }
function mapImportRow(r){
  const keys=Object.keys(r);
  const g=(cands)=>{ for(const k of keys){ const kl=String(k).toLowerCase().trim(); if(cands.some(n=>kl===n||kl.includes(n))) return String(r[k]==null?'':r[k]).trim(); } return ''; };
  let product=g(['product','team','category','vertical']);
  const teams=CFG().teams||{};
  if(product){ const up=product.toUpperCase();
    if(teams[up]) product=up;
    else { const match=Object.keys(teams).find(c=>(teams[c].name||'').toLowerCase()===product.toLowerCase()); product=match||''; } }
  return { name:g(['name','naam','full name','lead name','customer']), phone:g(['phone','mobile','number','contact','whatsapp']),
    email:g(['email','mail','e-mail']), city:g(['city','location','place']), product, source:g(['source','channel','lead source']) };
}
function parseImportFile(file){
  if(!file)return; const info=document.getElementById('importInfo'); info.textContent='Reading file…';
  const isCsv=/\.csv$/i.test(file.name); const reader=new FileReader();
  reader.onload=e=>{ try{
      let rows=[];
      if(isCsv){ rows=csvToRows(e.target.result); }
      else { if(typeof XLSX==='undefined'){ info.innerHTML='<span style="color:var(--red)">Excel reader load nahi hua — internet check karo ya CSV use karo.</span>'; return; }
        const data=new Uint8Array(e.target.result); const wb=XLSX.read(data,{type:'array'});
        rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''}); }
      IMPORT_ROWS=rows.map(mapImportRow).filter(r=>r.name);
      if(!IMPORT_ROWS.length){ info.innerHTML='<span style="color:var(--red)">Koi valid lead nahi mila (Name column check karo).</span>'; return; }
      info.innerHTML='<b style="color:var(--green)">'+IMPORT_ROWS.length+' leads mile ✓</b> — "Import karo" dabao.';
      const btn=document.getElementById('doImportBtn'); btn.disabled=false; btn.style.opacity='1';
    }catch(err){ info.innerHTML='<span style="color:var(--red)">File error: '+err.message+'</span>'; } };
  if(isCsv) reader.readAsText(file); else reader.readAsArrayBuffer(file);
}
function downloadSampleCsv(){
  const csv='Name,Phone,Email,City,Product,Source\nRohan Sharma,+919812345678,rohan@example.com,Pune,MHS,Facebook\nPriya Verma,+919800000000,priya@example.com,Delhi,TFD,Website\n';
  const blob=new Blob([csv],{type:'text/csv'}); const url=URL.createObjectURL(blob);

}

      : '<div class="panel"><div class="panel-b" style="text-align:center;color:var(--muted);padding:30px">Koi lead nahi mila "'+esc(state.searchQ)+'" ke liye.</div></div>')
    : '<div class="panel"><div class="panel-b" style="text-align:center;color:var(--muted);padding:30px">Upar search box me lead ka naam/phone likho — kiske paas hai turant pata chalega.</div></div>';
  const cards=(state.searchResults||[]).map(l=>`<div class="lcard" data-lead="${l.id}"><div class="top"><div><div class="nm">${esc(l.name)}</div><div class="meta">${esc(l.phone||'')} • ${esc(l.city||'')}</div></div>${badge(l.status)}</div>
    <div class="row"><span class="pill">${esc(l.product||'')}</span>${srcChip(l.source)}<span class="meta">👤 <b>${esc(l.owner_name||'—')}</b></span></div></div>`).join('');
  return `<div class="page-h"><h2>Lead Search</h2><span class="cnt">${state.searchQ?((state.searchResults||[]).length+' result'):''}</span></div>
    <div class="filters"><input class="search" id="searchBox" placeholder="🔍 Lead ka naam / phone / city…" value="${esc(state.searchQ||'')}"><button class="btn sm" data-action="dosearch">Search</button></div>
    ${table}<div class="cards">${cards}</div>`;
}

/* ---------------- LEAD DETAIL ---------------- */
function renderLeadDetail(){
  const l=state.currentLead; if(!l) return renderLeads(false);
  const tier=scoreTier(l.score);
  const stOpt=STATUS_LIST.map(s=>`<option ${l.status===s?'selected':''}>${s}</option>`).join('');
  const ownOpt=salesUsers().map(u=>`<option value="${u.id}" ${l.owner_id===u.id?'selected':''}>${u.name}</option>`).join('');
  const fuVal=l.next_followup||'';
  const canReassign=state.user.role!=='sales';
  const timeline=(l.activities||[]).slice().reverse().map(a=>`<li><div class="tt">${esc(a.title)}</div>
    <div class="tm">${fmtDateTime(a.created_at)} • ${esc(a.by_name)}${a.sub?' • '+esc(a.sub):''}</div></li>`).join('');
  const wonBadge=l.converted?`<span class="convo">✓ Customer CRM me push ho gaya</span>`:'';
  return `<div class="page-h"><a data-nav="back" style="font-weight:700">← Back</a></div>
  <div class="ld-head"><div class="r1"><div class="ld-avatar">${initials(l.name)}</div>
    <div style="flex:1"><h2>${esc(l.name)}</h2>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:6px">
        ${badge(l.status)} ${srcChip(l.source)} <span class="pill">${teamName(l.product)}</span>
        <span class="badge" style="background:${tier.c}20;color:${tier.c}">${tier.t} • score ${l.score}</span>${wonBadge}</div></div></div>
    <div class="ld-contact"><span>📞 <b>${esc(l.phone)}</b></span><span>✉️ <b>${esc(l.email)}</b></span><span>📍 <b>${esc(l.city)}</b></span>
      <span>🌐 <b>${esc(l.website||'—')}</b></span><span>👤 Owner: <b>${esc(l.owner_name)}</b></span><span>🗓️ Created: <b>${fmtDate(l.created_at)}</b></span></div>
    <div class="ld-actions"><button class="btn" data-action="call" data-lead="${l.id}">📞 Call now</button>
      <button class="btn ghost" data-action="miss" data-lead="${l.id}">📵 No answer (auto WA + RNR)</button>
      <button class="btn" style="background:#25d366" data-action="wa" data-lead="${l.id}">🟢 WhatsApp</button>
      <button class="btn" style="background:#ea4335" data-action="email" data-lead="${l.id}" data-mail="${esc(l.email)}">✉️ Email</button>
      <button class="btn ghost" style="color:var(--red);border-color:#ffd0cf" data-action="deletelead" data-lead="${l.id}">🗑️ Delete</button></div></div>
  <div class="grid2">
    <div class="panel"><div class="panel-h">Update</div><div class="panel-b">
      <div class="field"><label>Status</label><select data-action="setstatus" data-lead="${l.id}">${stOpt}</select></div>
      <div class="field"><label>Next follow-up (reminder)</label><input type="date" value="${fuVal}" data-action="setfollow" data-lead="${l.id}"></div>
      ${canReassign?`<div class="field"><label>Assign to (owner)</label><select data-action="setowner" data-lead="${l.id}">${ownOpt}</select></div>`:''}
      <div class="field"><label>Add note</label><textarea id="noteBox" rows="2" placeholder="Call ka summary likho…"></textarea></div>
      <button class="btn block" data-action="addnote" data-lead="${l.id}">Save note</button></div></div>
    <div class="panel"><div class="panel-h">Activity Timeline</div><div class="panel-b"><ul class="timeline">${timeline}</ul></div></div></div>`;
}

/* ---------------- toast / modal ---------------- */
function showToast(msg){const t=document.createElement('div');t.className='toast';t.innerHTML=`<span class="ok">✓</span> ${msg}`;document.body.appendChild(t);setTimeout(()=>t.remove(),3200);}
function openModal(html){const bg=document.createElement('div');bg.className='modal-bg';bg.id='modalBg';bg.innerHTML=html;document.body.appendChild(bg);bg.addEventListener('click',e=>{if(e.target===bg)closeModal();});}
function closeModal(){const m=document.getElementById('modalBg');if(m)m.remove();}

function addLeadModal(){
  const owOpt='<option value="auto">⚡ Auto — Round Robin (recommended)</option>'+salesUsers().map(u=>`<option value="${u.id}">${esc(u.name)} (${teamCode(u.team)})</option>`).join('');
  const srOpt=srcList().map(s=>`<option>${s}</option>`).join('');
  const prOpt=Object.keys(CFG().teams).map(p=>`<option value="${p}">${teamName(p)}</option>`).join('');
  openModal(`<div class="modal"><div class="modal-h"><h3>+ Add New Lead</h3><span class="x" data-action="closemodal">×</span></div>
    <div class="modal-b">
      <div class="field"><label>Name</label><input id="nl_name" placeholder="Customer ka naam"></div>
      <div class="field"><label>Phone</label><input id="nl_phone" placeholder="+91 …"></div>
      <div class="field"><label>Email</label><input id="nl_email"></div>
      <div class="field"><label>City</label><input id="nl_city"></div>
      <div class="field"><label>Product</label><select id="nl_product">${prOpt}</select></div>
      <div class="field"><label>Source</label><select id="nl_source">${srOpt}</select></div>
      <div class="field"><label>Assign to</label><select id="nl_owner">${owOpt}</select></div>
      <button class="btn block" data-action="savelead">Add Lead</button></div></div>`);
}
function addProductModal(){
  openModal(`<div class="modal"><div class="modal-h"><h3>+ Add Product / Team</h3><span class="x" data-action="closemodal">×</span></div>
    <div class="modal-b">
      <div class="field"><label>Short code (2–5 letters)</label><input id="np_code" maxlength="5" placeholder="e.g. TPX" style="text-transform:uppercase"></div>
      <div class="field"><label>Full name</label><input id="np_name" placeholder="e.g. The Powerful X"></div>
      <div class="field"><label>Colour</label><input id="np_color" type="color" value="#2d5be3" style="height:44px;padding:4px"></div>
      <div class="lead-sub" style="margin-bottom:12px">Add karne ke baad ye product lead form, routing, aur reports sab jagah dikhega. Iske liye agents assign karne ke liye Team me jaake unka product badlo.</div>
      <button class="btn block" data-action="saveproduct">Add Product</button></div></div>`);
}
function addUserModal(){
  const teamOpt=Object.keys(CFG().teams).map(k=>`<option value="${k}">${teamName(k)}</option>`).join('');
  openModal(`<div class="modal"><div class="modal-h"><h3>+ Add Team Member</h3><span class="x" data-action="closemodal">×</span></div>
    <div class="modal-b">
      <div class="field"><label>Name</label><input id="nu_name"></div>
      <div class="field"><label>Email</label><input id="nu_email"></div>
      <div class="field"><label>Phone</label><input id="nu_phone" placeholder="+91 …"></div>
      <div class="field"><label>Role</label><select id="nu_role"><option value="sales">Sales</option><option value="lead">Team Lead</option><option value="admin">Admin</option></select></div>
      <div class="field"><label>Team / Product</label><select id="nu_team">${teamOpt}</select></div>
      <div class="field"><label>Department</label><input id="nu_dept" placeholder="e.g. Pre Sales / TFD Sales"></div>
      <div class="field"><label>Login PIN (4 digit)</label><input id="nu_pin" maxlength="4" placeholder="e.g. 4321"></div>
      <button class="btn block" data-action="saveuser">Add Member</button></div></div>`);
}

/* ============================================================ EVENTS ============================================================ */
const gv=id=>{const e=document.getElementById(id);return e?e.value.trim():'';};
function findLeadLocal(id){ if(state.currentLead&&state.currentLead.id===id)return state.currentLead; return (state.leads||[]).find(l=>l.id===id); }

document.addEventListener('click',async function(e){
  const key=e.target.closest('[data-key]');
  if(key && !state.user){ const k=key.dataset.key;
    if(k==='back') state.pin=state.pin.slice(0,-1); else if(k==='clear') state.pin=''; else if(state.pin.length<4) state.pin+=k;
    state.loginErr=''; if(state.pin.length===4){ const pin=state.pin; render(); return doLogin(pin); } render(); return; }

  const nav=e.target.closest('[data-nav]');
  if(nav){ const r=nav.dataset.nav; if(r==='back'){ return go(state.user.role==='sales'?'myleads':'leads'); } return go(r); }

  const act=e.target.closest('[data-action]');
  if(act){ const a=act.dataset.action, id=act.dataset.lead;
    if(a==='logout'){ if(confirm('Logout karna hai?')) logout(); return; }
    if(a==='addlead'){ return addLeadModal(); }
    if(a==='adduser'){ return addUserModal(); }
    if(a==='deletelead'){ if(confirm('Ye lead delete karna hai? Delete report me record rahega.')){ await api('/api/leads/'+id,'DELETE'); state.toastMsg='🗑️ Lead delete ho gaya'; return go(state.user.role==='sales'?'myleads':'leads'); } return; }
    if(a==='rtab'){ state.reportTab=act.dataset.tab; return render(); }
    if(a==='dosearch'){ state.searchQ=gv('searchBox'); return go('search'); }
    if(a==='dl-deletions'){ const x=state.reports.deletions; if(!x)return; downloadCSV('deleted-leads-'+todayStr()+'.csv',[['User','Department','Deleted count'],...x.per.map(u=>[u.name,u.department,u.c])]); return; }
    if(a==='dl-users'){ const x=state.reports.usersList; if(!x)return; downloadCSV('user-list-'+todayStr()+'.csv',[['Name','Role','Department','Team','Email'],...x.users.map(u=>[u.name,u.role,u.department||'',u.team,u.email||''])]); return; }
    if(a==='rptdate'){ state.reportDate=gv('rptDate'); return refresh(); }
    if(a==='dl-attendance'){ const x=state.reports.attendance; if(!x)return; downloadCSV('attendance-'+todayStr()+'.csv',[['User','Department','Role','Status','Last login'],...x.per.map(u=>[u.name,u.department,u.role,u.present?'Present':'Absent',loginTime(u.lastLogin)])]); return; }
    if(a==='dl-leadsdist'){ const x=state.reports.leadsDist; if(!x)return; downloadCSV('leads-distribution-'+(x.from||todayStr())+'.csv',[['Agent','Department','Total',...x.cols],...x.per.map(u=>[u.name,u.department,u.total,...x.cols.map(c=>u.counts[c]||0)])]); return; }
    if(a==='dl-followups'){ const x=state.reports.followups; if(!x)return; downloadCSV('followup-missed-'+todayStr()+'.csv',[['User','Team','Overall missed','Today due'],...x.per.map(u=>[u.name,u.team,u.missed,u.todayDue])]); return; }
    if(a==='import'){ return importModal(); }
    if(a==='samplecsv'){ return downloadSampleCsv(); }
    if(a==='doimport'){ if(!IMPORT_ROWS.length) return; const r=await api('/api/leads/bulk','POST',{leads:IMPORT_ROWS}); closeModal();
      state.toastMsg='✅ '+r.created+' leads import + round-robin assign'+(r.skipped?' ('+r.skipped+' skip)':''); IMPORT_ROWS=[]; return refresh(); }
    if(a==='addproduct'){ return addProductModal(); }
    if(a==='saveproduct'){
      const code=gv('np_code'), name=gv('np_name'); if(!code||!name){alert('Code aur naam daalo');return;}
      const r=await api('/api/teams','POST',{code,name,color:document.getElementById('np_color').value});
      if(r.error){alert(r.error);return;}
      const me=await api('/api/me'); setCfg(me.config); closeModal();
      state.toastMsg='Product add ho gaya: '+r.code; return refresh();
    }
    if(a==='addsource'){ return addSourceModal(); }
    if(a==='savesource'){ const name=gv('ns_name'); if(!name){alert('Naam daalo');return;}
      await api('/api/sources','POST',{name,icon:gv('ns_icon')||name.slice(0,2),color:document.getElementById('ns_color').value});
      const me=await api('/api/me'); setCfg(me.config); closeModal(); state.toastMsg='Source add ho gaya: '+name; return refresh(); }
    if(a==='savesettings'){ await api('/api/settings','PATCH',{target_leads:+gv('st_leads'),target_interested:+gv('st_int'),target_closed:+gv('st_closed')});
      const me=await api('/api/me'); setCfg(me.config); state.toastMsg='Targets save ho gaye ✓'; return refresh(); }
    if(a==='applydash'){ const val=id=>{const e=document.getElementById(id);return e?e.value:'';};
      state.dashFilter={from:val('dfrom'),to:val('dto'),source:val('dsource'),department:val('ddept'),owner:val('downer')}; return refresh(); }
    if(a==='cleardash'){ state.dashFilter={from:'',to:'',source:'',department:'',owner:''}; return refresh(); }
    if(a==='email'){ const l=findLeadLocal(id); const mail=String((l&&l.email)||act.dataset.mail||''); if(mail.includes('@')){try{window.location.href='mailto:'+mail+'?subject='+encodeURIComponent('My Haul Store');}catch(_){}} await api('/api/leads/'+id+'/email','POST',{}); state.toastMsg='✉️ Email khul raha hai…'; return refresh(); }
    if(a==='clearfilters'){ state.filters={q:'',status:'',source:'',owner:'',product:'',open:''}; return refresh(); }
    if(a==='closemodal'){ return closeModal(); }
    if(a==='savelead'){
      const name=gv('nl_name'); if(!name){alert('Naam daalo');return;}
      const body={name,phone:gv('nl_phone'),email:gv('nl_email'),city:gv('nl_city'),
        product:document.getElementById('nl_product').value,source:document.getElementById('nl_source').value,
        owner_id:document.getElementById('nl_owner').value};
      const r=await api('/api/leads','POST',body); closeModal();
      state.toastMsg='Lead add ho gaya → '+r.lead.owner_name; return refresh();
    }
    if(a==='saveuser'){
      const name=gv('nu_name'); if(!name){alert('Naam daalo');return;}
      const pin=gv('nu_pin')||'0000';
      await api('/api/users','POST',{name,email:gv('nu_email'),phone:gv('nu_phone'),role:document.getElementById('nu_role').value,team:document.getElementById('nu_team').value,department:gv('nu_dept'),pin});
      closeModal(); state.toastMsg=name+' add ho gaya. PIN: '+pin; if(state.route==='users') return refresh(); return; }
    if(a==='toggleconn'){ await api('/api/connectors/'+act.dataset.ckey,'PATCH',{connected:+act.dataset.val}); state.toastMsg='Connector updated'; return refresh(); }
    if(a==='toggleauto'){ await api('/api/automation','PATCH',{key:act.dataset.akey,enabled:+act.dataset.val}); state.toastMsg='Automation updated'; return refresh(); }
    if(a==='call'){ const l=findLeadLocal(id); const ph=String((l&&l.phone)||'').replace(/[^\d+]/g,''); if(ph){try{window.location.href='tel:'+ph;}catch(_){}} await api('/api/leads/'+id+'/call','POST',{}); state.toastMsg='📞 Dialer khul raha hai'+(l?' — '+l.name:'')+'…'; return refresh(); }
    if(a==='wa'){ const l=findLeadLocal(id); const ph=String((l&&l.phone)||'').replace(/\D/g,''); if(ph){try{window.open('https://wa.me/'+ph+'?text='+encodeURIComponent('Hi '+(l?l.name.split(' ')[0]:'')),'_blank');}catch(_){}} await api('/api/leads/'+id+'/whatsapp','POST',{}); state.toastMsg='🟢 WhatsApp khul raha hai…'; return refresh(); }
    if(a==='miss'){ const r=await api('/api/leads/'+id+'/miss','POST',{}); state.toastMsg='📵 Miss → '+(r.steps||[]).join(' + ')+'. Lead close nahi hui.'; return refresh(); }
    if(a==='addnote'){ const v=gv('noteBox'); if(v){ await api('/api/leads/'+id+'/activity','POST',{title:'📝 Note',sub:v}); state.toastMsg='Note save ho gaya'; return refresh(); } return; }
    return;
  }
  const drill=e.target.closest('[data-drill],[data-drillowner]');
  if(drill){ const d=drill.dataset;
    state.filters={q:'',status:d.fstatus||d.drillstatus||'',source:d.fsource||'',owner:d.fowner||d.drillowner||'',product:d.fproduct||'',open:d.fopen||''};
    return go('leads'); }
  const lead=e.target.closest('[data-lead]');
  if(lead && !e.target.closest('[data-action]')){ return go('lead',{id:lead.dataset.lead}); }
});

document.addEventListener('change',async function(e){
  const el=e.target;
  if(el.id==='importFile'){ return parseImportFile(el.files[0]); }
  if(el.id==='demoSel'){ if(el.value){ const pin=el.value; state.pin=pin; render(); return doLogin(pin); } return; }
  const a=el.dataset&&el.dataset.action; const id=el.dataset&&el.dataset.lead;
  if(a==='setstatus'){ await api('/api/leads/'+id,'PATCH',{status:el.value}); state.toastMsg=(STATUS[el.value]?.won?'🎉 WON! Customer CRM me push ho gaya.':'Status updated'); return refresh(); }
  if(a==='setfollow'){ await api('/api/leads/'+id,'PATCH',{next_followup:el.value||null}); state.toastMsg='Reminder set ho gaya'; return refresh(); }
  if(a==='setowner'){ await api('/api/leads/'+id,'PATCH',{owner_id:el.value}); state.toastMsg='Lead reassign ho gaya'; return refresh(); }
  if(el.id==='fstatus'){ state.filters.status=el.value; return refresh(); }
  if(el.id==='fsource'){ state.filters.source=el.value; return refresh(); }
  if(el.id==='fowner'){ state.filters.owner=el.value; return refresh(); }
  if(el.id==='fproduct'){ state.filters.product=el.value; return refresh(); }
});

let searchTimer=null;
document.addEventListener('input',function(e){
  if(e.target.id==='fq'){ state.filters.q=e.target.value; clearTimeout(searchTimer);
    searchTimer=setTimeout(async()=>{ const box=document.getElementById('fq'); const pos=box?box.selectionStart:null;
      await refresh(); const nb=document.getElementById('fq'); if(nb){ nb.focus(); if(pos!=null){try{nb.setSelectionRange(pos,pos);}catch(_){}} } },250); }
});

document.addEventListener('keydown',function(e){
  if(e.key==='Enter' && (e.target.id==='globalSearch'||e.target.id==='searchBox')){ state.searchQ=e.target.value.trim(); go('search'); }
});

/* boot */
render();
</script>
</body>
</html>
